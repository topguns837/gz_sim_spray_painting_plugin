version: "3.9"

# Spray Paint Plugin – Docker Compose
#
# Usage:
#   Build image:
#     docker compose -f docker/docker-compose.yml build
#
#   Run headless (server only, trigger spray via gz topic from another terminal):
#     docker compose -f docker/docker-compose.yml up spray-headless
#
#   Run with GUI (requires X11 on host first: xhost +local:docker):
#     docker compose -f docker/docker-compose.yml up spray-gui
#
#   Open an interactive shell:
#     docker compose -f docker/docker-compose.yml run --rm shell

x-common: &common
  image: spray_paint_plugin
  build:
    context: ..
    dockerfile: Dockerfile
  environment:
    - GZ_SIM_SYSTEM_PLUGIN_PATH=/ws/install/gz_sim_spray_painting_plugin/lib/gz_sim_spray_painting_plugin
    - GZ_VERSION=harmonic
    - SPRAY_WORLD=/ws/install/gz_sim_spray_painting_plugin/share/gz_sim_spray_painting_plugin/worlds/spray_painting.sdf

services:

  # Headless server (no GUI, use gz topic to trigger spray)
  spray-headless:
    <<: *common
    command: >
      gz sim -s
      /ws/install/gz_sim_spray_painting_plugin/share/gz_sim_spray_painting_plugin/worlds/spray_painting.sdf
    network_mode: host

  # GUI (requires X11 forwarding on host)
  # Run on host first: xhost +local:docker
  spray-gui:
    <<: *common
    command: >
      gz sim
      /ws/install/gz_sim_spray_painting_plugin/share/gz_sim_spray_painting_plugin/worlds/spray_painting.sdf
    environment:
      - GZ_SIM_SYSTEM_PLUGIN_PATH=/ws/install/gz_sim_spray_painting_plugin/lib/gz_sim_spray_painting_plugin
      - GZ_VERSION=harmonic
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    network_mode: host

  # Interactive shell
  shell:
    <<: *common
    command: bash
    stdin_open: true
    tty: true
    network_mode: host
